  <script type="text/babel" src="assets/ScreenPlayer.jsx"></script>
  <script type="text/babel" src="assets/ScreenTeam.jsx"></script>
  <script type="text/babel" src="assets/ScreenRace.jsx"></script>
  <script type="text/babel" src="assets/ScreenNext.jsx"></script>
  <script type="text/babel" src="assets/ScreenPalmares.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [stack, setStack] = React.useState([{ screen: 'home' }]);
      const [fullscreen, setFullscreen] = React.useState(
        typeof window !== 'undefined' && window.innerWidth < 768
      );
      React.useEffect(() => {
        const onResize = () => setFullscreen(window.innerWidth < 768);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      const push = (entry) => setStack(s => [...s, entry]);
      const pop = () => setStack(s => s.length > 1 ? s.slice(0, -1) : s);
      const current = stack[stack.length - 1];

      const screen = (() => {
        switch (current.screen) {
          case 'home':
            return <ScreenHome
              onOpenPlayer={(name) => push({ screen: 'player', arg: name })}
              onOpenTeam={(name) => push({ screen: 'team', arg: name })}
              onOpenRace={(n) => push({ screen: 'race', arg: n })}
              onOpenNext={() => push({ screen: 'next' })}
              onOpenPalmares={() => push({ screen: 'palmares' })}
            />;
          case 'player':
            return <ScreenPlayer
              name={current.arg}
              onBack={pop}
              onOpenTeam={(name) => setStack([{ screen: 'home' }, { screen: 'team', arg: name }])}
              onOpenRace={(n) => push({ screen: 'race', arg: n })}
              onOpenPlayer={(name) => push({ screen: 'player', arg: name })}
            />;
          case 'team':
            return <ScreenTeam
              name={current.arg}
              onBack={pop}
              onOpenPlayer={(name) => push({ screen: 'player', arg: name })}
            />;
          case 'race':
            return <ScreenRace
              raceNumber={current.arg}
              onBack={pop}
              onOpenPlayer={(name) => push({ screen: 'player', arg: name })}
            />;
          case 'next':
            return <ScreenNext onBack={pop} />;
          case 'palmares':
            return <ScreenPalmares onBack={pop} />;
          default:
            return null;
        }
      })();

      if (fullscreen) {
        // En móvil: pantalla completa, sin marco iPhone, sin status bar simulada
        return (
          <div style={{
            width: '100vw', height: '100vh', overflow: 'hidden',
            background: '#0F1923',
          }}>
            {screen}
          </div>
        );
      }
      // Escritorio: mockup centrado
      return (
        <div style={{ transform: 'scale(var(--lp-scale, 1))', transformOrigin: 'center center' }}>
          <IOSDevice dark={true} width={402} height={874}>
            {screen}
          </IOSDevice>
        </div>
      );
    }

    function setScale() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      if (vw < 768) { document.documentElement.style.setProperty('--lp-scale', 1); return; }
      const sx = vw / (402 + 40);
      const sy = vh / (874 + 40);
      const s = Math.min(1, sx, sy);
      document.documentElement.style.setProperty('--lp-scale', s);
    }
    setScale();
    window.addEventListener('resize', setScale);

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
